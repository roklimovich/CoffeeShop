<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Maison du Café</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>

<header class="site-header">
    <div class="brand"><h1>Maison du Café</h1></div>
    <nav class="top-nav">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="active" href="login.html">Login</a></li>
        </ul>
    </nav>
    <div class="hero" role="img" aria-label="Coffee beans background"></div>
</header>

<main class="content auth-container">
    <div class="auth-box glass">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to enjoy rewards & faster orders</p>

        <form class="auth-form">
            <label>Email</label>
            <input type="email" required placeholder="yourname@mail.com">

            <label>Password</label>
            <input type="password" required placeholder="••••••">

            <button type="submit" class="auth-btn">Login</button>
        </form>

        <p class="auth-footer-text">
            Don’t have an account?
            <a href="signup.html">Sign up</a>
        </p>
    </div>
</main>

<footer class="site-footer">
    <p>© 2025 Maison du Café • Warsaw • <a href="contact.html">Contact</a></p>
</footer>

</body>
</html>
